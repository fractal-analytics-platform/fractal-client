name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # At 07:00 on Monday
    - cron: "0 7 * * 1"

permissions: {}

jobs:

  tests:
    name: "Python ${{ matrix.python-version }}"
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    env:
      FRACTAL_SERVER_PYTHON: "3.12"
      FRACTAL_SERVER_BRANCH: "main"

    permissions:
      contents: read

    steps:

      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@28f2168f4d98ee0445e3c6321f6e6616c83dd5ec
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run docker compose
        run: docker compose -f tests/fractal-server/docker-compose.yml up -d

      - name: Setup uv
        uses: astral-sh/setup-uv@447e6d02b15d65b3247cce2d6019f11957285d11
        with:
          version: "0.9.7"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Test with pytest
        env:
          COVERAGE_FILE: coverage-data-${{ matrix.python-version }}
        run: uv run --frozen coverage run -m pytest

      - name: Log server container if pytest failed
        if: failure()
        run: docker compose -f tests/fractal-server/docker-compose.yml logs

      - name: Upload coverage data
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: coverage-data-${{ matrix.python-version }}
          path: coverage-data-${{ matrix.python-version }}*


  coverage:

    name: Coverage
    runs-on: ubuntu-24.04
    needs: tests

    permissions:
      # Allows the action to publish new comments directly on trusted PRs.
      # Forked pull_request runs are downgraded to read-only by GitHub.
      pull-requests: write
      # Allows updating the python-coverage-comment-action branch and editing
      # existing comments when direct publication is allowed.
      contents: write

    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          # The git operations in python-coverage-comment-action utilize the
          # token stored by actions/checkout.
          # https://github.com/py-cov-action/python-coverage-comment-action/issues/610
          persist-credentials: true
      - uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          pattern: coverage-data-*
          merge-multiple: true
      - uses: astral-sh/setup-uv@447e6d02b15d65b3247cce2d6019f11957285d11
        with:
          version: "0.9.7"
          enable-cache: true
      - run: uv sync --frozen --only-group dev
      - run: uv run --frozen coverage combine coverage-data-*
      - uses: py-cov-action/python-coverage-comment-action@7188638f871f721a365d644f505d1ff3df20d683
        id: coverage_comment
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 90
          MINIMUM_ORANGE: 60
          ANNOTATE_MISSING_LINES: true
          ANNOTATION_TYPE: notice
